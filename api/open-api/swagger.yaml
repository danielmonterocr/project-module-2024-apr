openapi: 3.1.0
info:
  title: Swagger - OpenAPI 3.1
  description: API documentation for the final project.
  # termsOfService: http://swagger.io/terms/
  # contact:
  #   email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
# externalDocs:
#   description: Find out more about Swagger
#   url: http://swagger.io
# servers:
#   - url: https://petstore3.swagger.io/api/v3
tags:
  # - name: listing
  #   description: Access to listings
    # externalDocs:
    #   description: Find out more about our store
    #   url: http://swagger.io
  - name: users
    description: APIs related to user operations
  - name: listings
    description: APIs related to listing operations
paths:
  /api/users/register:
    post:
      tags:
        - users
      summary: Create user
      description: Create a new user
      operationId: createUser
      requestBody:
        description: Create user object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
              required:
                - username
                - email
                - password
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/users/login:
    post:
      tags:
        - users
      summary: Logs user into the system
      description: Creates a new token for the user
      operationId: loginUser
      parameters:
        - name: username
          in: query
          description: The user name for login
          required: false
          schema:
            type: string
        - name: password
          in: query
          description: The password for login in clear text
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Succesful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers:
            token:
              description: The token to be used for authentication
              schema:
                type: string
          #   X-Rate-Limit:
          #     description: Calls per hour allowed by the user
          #     schema:
          #       type: integer
          #       format: int32
          #   X-Expires-After:
          #     description: Date in UTC when token expires
          #     schema:
          #       type: string
          #       format: date-time
        '400':
          description: Invalid username/password supplied
        '404':
          description: User not found
  /api/users:
    get:
      tags:
        - users
      summary: List all users
      description: This can only be done by the logged in user
      operationId: listUsers
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                    - $ref: '#/components/schemas/User'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/users/{userId}:
    get:
      tags:
        - users
      summary: Retrieve details of a specific user
      description: This can only be done by the logged in user
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          description: The ID of the user to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '404':
          description: User not found
    patch:
      tags:
        - users
      summary: Update details of a specific user
      description: This can only be done by the logged in user
      operationId: updateUser
      parameters:
        - name: userId
          in: path
          description: The ID of the user to modify
          required: true
          schema:
            type: string
      requestBody:
        description: Update an existent user object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
              anyOf:
                - username
                - email
      responses:
        '200':
          description: Succesful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags:
        - users
      summary: Delete user
      description: This can only be done by the logged in user
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          description: The name of the user that needs to be deleted
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Succesful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Bad request
        '404':
          description: User not found
  /api/listings:
    post:
      tags:
        - listings
      summary: Create a new listing
      description: This can only be done by the logged in user
      operationId: createListing
      requestBody:
        description: Create listing object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Listing'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
        '400':
          description: Listing already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    get:
      tags:
        - listings
      summary: List all listings
      description: This can only be done by the logged in user
      operationId: listListings
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                    - $ref: '#/components/schemas/Listing'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/listings/{listingId}:
    get:
      tags:
        - listings
      summary: Retrieve details of a specific listing
      description: This can only be done by the logged in user
      operationId: getListingById
      parameters:
        - name: listingId
          in: path
          description: The ID of the listing to retrieve
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
        '400':
          description: Bad request
        '404':
          description: Listing not found
    patch:
      tags:
        - listings
      summary: Update details of a specific listing
      operationId: updateListing
      parameters:
        - name: listingId
          in: path
          description: The ID of the listing to modify
          required: true
          schema:
            type: string
      requestBody:
        description: Update an existent listing object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Listing'
              # anyOf:
              #   - title
              #   - description
              #   - location
      responses:
        '200':
          description: Succesful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags:
        - listings
      summary: Delete listig
      description: This can only be done by the logged in user
      operationId: deleteListing
      parameters:
        - name: listingId
          in: path
          description: The name of the listing that needs to be deleted
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Succesful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Bad request
        '404':
          description: Listing not found
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          examples: [10]
        username:
          type: string
          examples: [theUser]
        firstName:
          type: string
          examples: [John]
        lastName:
          type: string
          examples: [James]
        email:
          type: string
          examples: [john@email.com]
        password:
          type: string
          examples: ['12345']
        phone:
          type: string
          examples: ['12345']
        userStatus:
          type: integer
          description: User Status
          format: int32
          examples: [1]
    Listing:
      type: object
      properties:
        provider:
          type: string
          examples: [Airbnb, VRBO, HomeAway]
        title:
          type: string
          examples: [theListing]
        description:
          type: string
          examples: [This is a listing]
        location:
          type: string
          examples: [New York]
        userId:
          type: string
          examples: [1234567890]
    ApiResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
  requestBodies:
  securitySchemes:
    api_key:
      type: apiKey
      name: api_key
      in: header
