services:
  mytb:
    restart: always
    image: "thingsboard/tb-postgres"
    ports:
      - "8080:9090"
      - "1883:1883"
      - "7070:7070"
      - "5683-5688:5683-5688/udp"
    environment:
      TB_QUEUE_TYPE: in-memory
    volumes:
      - ~/.mytb-data:/data
      - ~/.mytb-logs:/var/log/thingsboard

  mongo:
    image: mongo
    restart: always
    env_file: ".env"
    ports:
      - 27017:27017

  server:
    build:
      context: .
    depends_on:
      - mytb
      - mongo
    environment:
      NODE_ENV: production
    env_file: ".env"
    ports:
      - 3000:3000