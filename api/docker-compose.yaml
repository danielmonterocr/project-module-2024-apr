services:
  mytb:
    restart: always
    image: "thingsboard/tb-postgres"
    ports:
      - "8080:9090"
      - "1883:1883"
      - "7070:7070"
      - "5683-5688:5683-5688/udp"
    environment:
      TB_QUEUE_TYPE: in-memory
    volumes:
      - ~/.mytb-data:/data
      - ~/.mytb-logs:/var/log/thingsboard

  mongo:
    image: mongo
    restart: always
    env_file: ".env"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=$DB_USER
      - MONGO_INITDB_ROOT_PASSWORD=$DB_PASSWORD
    ports:
      - $DB_PORT:$DB_PORT

  server:
    build:
      context: .
    depends_on:
      - mytb
      - mongo
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: $PORT
      DB_USER: $DB_USER
      DB_PASSWORD: $DB_PASSWORD
      DB_PORT: $DB_PORT
      DB_DOMAIN: $DB_DOMAIN
      DB_NAME: $DB_NAME

    ports:
      - $PORT:$PORT

  simulator:
    profiles: ["simulator"]
    build:
      context: ../simulator
    depends_on:
      - server
      - mytb
    restart: on-failure
    environment:
      API_URL: "http://server:${PORT:-3000}"
      MQTT_BROKER: mytb
      MQTT_PORT: 1883
      PUBLISH_INTERVAL_MULTIPLIER: "${PUBLISH_INTERVAL_MULTIPLIER:-1.0}"
      SIM_NUM_LISTINGS: "${SIM_NUM_LISTINGS:-}"
      SIM_CONFIG_FILE: "${SIM_CONFIG_FILE:-}"
      LOG_LEVEL: "${SIM_LOG_LEVEL:-INFO}"
    volumes:
      - "${SIM_CONFIG_PATH:-/dev/null}:/app/sim-config.json:ro"
