name: firmware

on:
  pull_request:
  push:
    paths:
      - 'esp32/platformio/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Platform IO
      run: |
        python -m pip install --upgrade pip
        pip install -U platformio

    - name: Build
      run: |
        cd esp32/platformio
        platformio run
      env:
        CI: true
