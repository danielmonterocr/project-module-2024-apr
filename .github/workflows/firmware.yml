name: firmware

on:
  pull_request:
    paths:
      - 'esp32/platformio/**'
      - 'arduino/**'
  push:
    branches: [main]
    paths:
      - 'esp32/platformio/**'
      - 'arduino/**'

permissions:
  contents: read

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: energy-node-esp32
            path: esp32/platformio/power-node
            needs-config: true
          - name: energy-node-arduino
            path: arduino/power-node
            needs-config: false
          - name: temperature-node
            path: esp32/platformio/temp-node
            needs-config: true
          - name: water-flow-node
            path: esp32/platformio/water-flow-node
            needs-config: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: '3.11'
      - name: Cache PlatformIO
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install -U platformio
      - name: Copy config (if needed)
        if: matrix.needs-config
        run: cp ${{ matrix.path }}/include/config-dist.h ${{ matrix.path }}/include/config.h
      - name: Build ${{ matrix.name }}
        run: platformio run -d ${{ matrix.path }}
        env:
          CI: true
      - name: Upload firmware binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: firmware-${{ matrix.name }}
          path: ${{ matrix.path }}/.pio/build/**/firmware.*

