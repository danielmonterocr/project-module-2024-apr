name: Build project
on: [push]
jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile proposal
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: docs/proposal
          root_file: proposal.tex

      - name: Upload proposal
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: docs/proposal/proposal.pdf
